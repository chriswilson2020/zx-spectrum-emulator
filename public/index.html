<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ZX Spectrum 48K</title>
    <link rel="stylesheet" href="./public/styles.css">
  </head>
  <body>
    <main class="shell">
      <section class="stage" aria-label="ZX Spectrum display and debugger">
        <div class="screen-wrap">
          <canvas id="screen" width="320" height="240"></canvas>
        </div>
        <section class="debugger" aria-label="Machine debugger">
          <div class="debug-card registers-card">
            <h2>Registers</h2>
            <div id="registerGrid" class="register-grid"></div>
            <div id="flagGrid" class="flag-grid" aria-label="CPU flags"></div>
          </div>
          <div class="debug-card basic-card">
            <h2>BASIC</h2>
            <div id="basicStatus" class="basic-status"></div>
          </div>
          <div class="debug-card disassembly-card">
            <h2>Disassembly</h2>
            <ol id="disassembly" class="disassembly"></ol>
          </div>
          <div class="debug-card memory-card">
            <h2>Memory</h2>
            <div id="memoryInspector" class="memory-inspector"></div>
          </div>
        </section>
      </section>
      <aside class="panel" aria-label="Machine controls">
        <header>
          <h1>ZX Spectrum 48K</h1>
          <output id="status">Loading ROM...</output>
        </header>
        <div class="controls">
          <button id="runPause" type="button" aria-label="Pause">Pause</button>
          <button id="stepFrame" type="button">Frame</button>
          <button id="stepInstruction" type="button">Step</button>
          <button id="reset" type="button">Reset</button>
          <button id="typeHello" type="button">Type Hello</button>
          <button id="audioToggle" type="button" aria-pressed="false">Sound Off</button>
        </div>
        <form id="pasteForm" class="paste-form">
          <label for="pasteText">Paste BASIC</label>
          <textarea id="pasteText" rows="5" spellcheck="false">10 PRINT "HELLO"
RUN</textarea>
          <button type="submit">Type Pasted Text</button>
        </form>
        <section class="tape-panel" aria-label="TAP loader">
          <label for="tapFile">Load TAP</label>
          <input id="tapFile" type="file" accept=".tap,.tzx">
          <div id="tapList" class="tap-list" aria-live="polite"></div>
          <button id="tapLoad" type="button" disabled>Load Selected Block</button>
        </section>
        <section class="snapshot-panel" aria-label="Snapshot loader">
          <label for="snapshotFile">Snapshots</label>
          <input id="snapshotFile" type="file" accept=".z80">
          <button id="snapshotSave" type="button">Save Z80 Snapshot</button>
        </section>
        <dl>
          <div>
            <dt>Frame</dt>
            <dd id="frame">0</dd>
          </div>
          <div>
            <dt>PC</dt>
            <dd id="pc">0000</dd>
          </div>
          <div>
            <dt>Border</dt>
            <dd id="border">0</dd>
          </div>
          <div>
            <dt>Key</dt>
            <dd id="lastKey">-</dd>
          </div>
          <div>
            <dt>Mapped</dt>
            <dd id="mappedKeys">-</dd>
          </div>
          <div>
            <dt>Held</dt>
            <dd id="heldKeys">-</dd>
          </div>
        </dl>
      </aside>
    </main>
    <script type="module" src="./public/app.js"></script>
  </body>
</html>
