<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Z80 Machine Lab</title>
    <link rel="icon" href="data:,">
    <link rel="stylesheet" href="./public/styles.css">

  <body class="selector-body">
    <main class="selector-shell" aria-label="Machine selector">
      <section class="selector-hero">
        <img src="./public/assets/machine-selector-banner.png" alt="" class="selector-hero-image">
        <div class="selector-overlay">
          <p class="selector-kicker">Z80 Machine Lab</p>
          <h1>Choose a machine</h1>
        </div>
      </section>
      <section class="machine-grid" aria-label="Available machines">
        <a class="machine-link spectrum-link" href="./spectrum.html">
          <span class="machine-screen spectrum-screen" aria-hidden="true">
            <span></span>
          </span>
          <strong>ZX Spectrum 48K</strong>
          <small>ROM, BASIC, display, tape, snapshots, debugger</small>
        </a>
        <a class="machine-link cpm-link" href="./cpm.html">
          <span class="machine-screen cpm-screen" aria-hidden="true">
            <span>A&gt;</span>
          </span>
          <strong>CP/M 2.2</strong>
          <small>Bootable z80pack disk, terminal, disk workflow</small>
        </a>
      </section>
      <footer class="site-contact-footer">
        <span>Contact</span>
        <img src="./public/assets/contact-email.png" alt="Contact email address" width="388" height="60">
      </footer>
    </main>
